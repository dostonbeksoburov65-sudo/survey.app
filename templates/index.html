<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <main class="hero-page">
        <div class="hero-card animate-in">
            <div class="hero-badge">Psychological Assessment</div>
            <h1 class="hero-title">Academic<br><span class="accent">Self-Efficacy</span><br>Scale</h1>
            <p class="hero-subtitle">A validated 20-question assessment to measure your academic self-efficacy and confidence in challenges.</p>

            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-num">20</span>
                    <span class="stat-label">Questions</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-num">5</span>
                    <span class="stat-label">Min</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span class="stat-num">6</span>
                    <span class="stat-label">States</span>
                </div>
            </div>

            <div class="hero-actions">
                <a href="{{ url_for('start') }}" class="btn-primary">
                    <span>Start New Survey</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </a>
                <a href="{{ url_for('history') }}" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>View Past Results</span>
                </a>
            </div>
        </div>

        <div class="hero-visual animate-in-delay">
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="ring ring3"></div>
            <div class="center-icon">🎯</div>
        </div>
    </main>
</body>
</html>
